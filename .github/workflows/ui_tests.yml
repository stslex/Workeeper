name: Android UI Tests (Optional)

# UI tests are NOT required for PRs or merges.
# Run manually via workflow_dispatch when needed.
on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - all

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Smoke UI tests - fast, critical tests with mocked data
  smoke-tests:
    name: Smoke UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: inputs.test_suite == 'smoke' || inputs.test_suite == 'all'

    strategy:
      matrix:
        api-level: [ 34 ]
        target: [ google_apis ]
        arch: [ x86_64 ]
      fail-fast: false

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Keystore
        env:
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE }}" > keystore.jks.asc
          gpg -d --passphrase "${{ secrets.KEYSTORE_PASSPHRASE }}" --batch keystore.jks.asc > keystore.jks
          echo "storeFile=keystore.jks" >> keystore.properties
          echo "keyAlias=$KEYSTORE_KEY_ALIAS" >> keystore.properties
          echo "storePassword=$KEYSTORE_STORE_PASSWORD" >> keystore.properties
          echo "keyPassword=$KEYSTORE_KEY_PASSWORD" >> keystore.properties

      - name: Create Google Services Config files
        env:
          GOOGLE_SERVICES_JSON_STORE: ${{ secrets.GOOGLE_SERVICES_JSON_STORE }}
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_STORE" > app/store/google-services.json.b64
          base64 -d -i app/store/google-services.json.b64 > app/store/google-services.json
          echo "$GOOGLE_SERVICES_JSON_DEV" > app/dev/google-services.json.b64
          base64 -d -i app/dev/google-services.json.b64 > app/dev/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Use CI-optimized Gradle properties
        run: cp .github/properties/gradle-ci.properties gradle.properties

      - name: Use CI-optimized Convention Gradle properties
        run: cp .github/properties/gradle-convention-ci.properties build-logic/gradle.properties

      - name: Restore Gradle build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-build-cache-${{ runner.os }}-${{ hashFiles('settings.gradle.kts', '**/build.gradle.kts', 'gradle/libs.versions.toml', 'gradle.properties') }}
          restore-keys: |
            gradle-build-cache-${{ runner.os }}-

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 4096 -partition-size 4096
          disable-animations: true
          emulator-boot-timeout: 900
          script: echo "Generated AVD snapshot for caching."

      - name: Run Smoke UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 4096 -partition-size 4096
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            adb logcat > logcat-smoke.txt &
            ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.annotation=io.github.stslex.workeeper.core.ui.test.annotations.Smoke --full-stacktrace --continue
            adb logcat -d > logcat-smoke-final.txt

      - name: Publish Smoke Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/build/outputs/androidTest-results/connected/**/*.xml
            **/build/test-results/**/*.xml
          check_name: Smoke UI Test Results (API ${{ matrix.api-level }})
          comment_title: Smoke UI Test Results (API ${{ matrix.api-level }})
          commit: ${{ github.sha }}
          report_individual_runs: true
          deduplicate_classes_by_file_name: false
          compare_to_earlier_commit: true
          pull_request_build: commit
          check_run_annotations: all tests, skipped tests

      - name: Detailed Smoke Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: |
            **/build/outputs/androidTest-results/connected/**/*.xml
            **/build/test-results/**/*.xml
          check_name: Detailed Smoke Test Report (API ${{ matrix.api-level }})
          detailed_summary: true
          include_passed: true
          fail_on_failure: false
          require_tests: true
          annotate_only: false
          job_summary: true

      - name: Upload smoke test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-reports-api-${{ matrix.api-level }}
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
          retention-days: 30

      - name: Upload logcat output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logcat-smoke-api-${{ matrix.api-level }}
          path: |
            logcat-smoke.txt
            logcat-smoke-final.txt
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-smoke-api-${{ matrix.api-level }}
          path: |
            **/build/outputs/connected_android_test_additional_output/
          retention-days: 14
          if-no-files-found: ignore

  # Regression UI tests - comprehensive integration tests
  regression-tests:
    name: Regression UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: inputs.test_suite == 'regression' || inputs.test_suite == 'all'

